services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-ventas_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  back-ventas:
    build: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: back-ventas
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ventas_db}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend_net

  back-despachos:
    build: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: back-despachos
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ventas_db}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend_net

  front-despacho:
    build: ./front_despacho
    container_name: front-despacho
    restart: always
    ports:
      - "80:8080"
    environment:
      # nginx hace envsubst de estas en proxy_pass; sin ellas nginx no arranca
      BACKEND_VENTAS_URL: http://back-ventas:8080
      BACKEND_DESPACHOS_URL: http://back-despachos:8081
    depends_on:
      - back-ventas
      - back-despachos
    networks:
      - backend_net

volumes:
  mysql_data:

networks:
  backend_net:
    driver: bridge
